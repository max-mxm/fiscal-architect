name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, test & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # src/routeTree.gen.ts est généré par le plugin tanstackStart de Vite,
      # mais tsc (lint) tourne hors Vite. On le génère donc explicitement.
      - name: Generate route tree
        run: pnpm generate:routes

      - name: Lint (tsc --noEmit)
        run: pnpm lint

      - name: Test (Vitest)
        run: pnpm test

      - name: Build
        run: pnpm build
